        href: skills.qmd
    right:
      - icon: github
        href: "https://github.com/pawan1198"
        aria-label: GitHub
      - icon: linkedin
        href: "https://www.linkedin.com/in/pawanjangra1198/"
        aria-label: LinkedIn
      - icon: twitter-x
        href: "https://twitter.com/pawanjangra1198"
        aria-label: Twitter

  page-footer:
    background: "#0f172a"
    foreground: "rgba(255,255,255,0.5)"
