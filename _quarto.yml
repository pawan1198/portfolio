        href: "mailto:pawanjangra1198@gmail.com"

  sidebar: false

# ── Global filters — applied to every page automatically ──────────
filters:
  - assets/page-band.lua

format:
  html:
    theme:
      - cosmo
      - assets/theme.scss
    css: assets/styles.css
    toc: false
    page-layout: full
    grid:
      sidebar-width: 0px
      body-width: 1200px
      margin-width: 0px
    smooth-scroll: true
    link-external-newwindow: true
    # Scripts injected globally — no per-page include needed
    include-in-header:  assets/head-extras.html
    include-after-body: assets/partials/page-scripts.html

execute:
  freeze: auto
  echo: true
  warning: false
  message: false
