    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Content"
        menu:
          - text: "📊 Data Visualizations"
            href: data_vizs.qmd
          - text: "✍️ Blog"
            href: blog.qmd
          - text: "📄 Articles"
            href: article.qmd
          - text: "📚 Statistics with R"
            href: statistics-with-r.qmd
